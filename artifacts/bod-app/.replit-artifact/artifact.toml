kind = "web"
previewPath = "/"
title = "Birth Of Dream"
version = "1.0.0"
id = "artifacts/bod-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21446

[services.development]
run = "pnpm --filter @workspace/bod-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bod-app", "run", "build" ]
publicDir = "artifacts/bod-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21446"
BASE_PATH = "/"
